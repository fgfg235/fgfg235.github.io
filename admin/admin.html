<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Weburple</title>
  <link rel="stylesheet" href="/admin/admin.css">
</head>
<body>

<div class="header">
  <h1>Weburple Admin</h1>
  <a href="/" target="_blank">사이트 미리보기</a>
</div>

<div class="container">
  <form id="adminForm">

    <div class="card">
      <h2>사이트 설정</h2>
      <label>사이트 제목</label>
      <input type="text" id="siteTitle">
      <label>저작권 표시</label>
      <input type="text" id="siteCopyright">
    </div>

    <div class="card">
      <h2>히어로</h2>
      <div class="bilingual-group">
        <label>부제 (KO)</label>
        <input type="text" id="heroSubtitleKo">
        <label>부제 (EN)</label>
        <input type="text" id="heroSubtitleEn">
      </div>
      <div class="bilingual-group">
        <label>태그라인 (KO)</label>
        <input type="text" id="heroTaglineKo">
        <label>태그라인 (EN)</label>
        <input type="text" id="heroTaglineEn">
      </div>
    </div>

    <div class="card">
      <h2>소개</h2>
      <label>이름</label>
      <input type="text" id="aboutName">
      <div class="bilingual-group">
        <label>자기소개 (KO)</label>
        <textarea id="aboutBioKo" rows="3"></textarea>
        <label>자기소개 (EN)</label>
        <textarea id="aboutBioEn" rows="3"></textarea>
      </div>
      <label>GitHub URL</label>
      <input type="url" id="aboutGithub">
      <label>이메일</label>
      <input type="email" id="aboutEmail">
    </div>

    <div class="card">
      <h2>프로젝트</h2>
      <div id="projectList"></div>
      <button type="button" class="btn btn-secondary" onclick="addProject()">+ 프로젝트 추가</button>
    </div>

    <div class="card">
      <h2>연락처</h2>
      <div class="bilingual-group">
        <label>섹션 제목 (KO)</label>
        <input type="text" id="contactTitleKo">
        <label>섹션 제목 (EN)</label>
        <input type="text" id="contactTitleEn">
      </div>
      <div class="bilingual-group">
        <label>메시지 (KO)</label>
        <textarea id="contactMessageKo" rows="2"></textarea>
        <label>메시지 (EN)</label>
        <textarea id="contactMessageEn" rows="2"></textarea>
      </div>
    </div>

    <div class="actions">
      <button type="button" class="btn btn-primary" onclick="save()">저장</button>
      <button type="button" class="btn btn-deploy" onclick="saveAndDeploy()">저장 & 배포</button>
    </div>

  </form>
</div>

<div class="toast" id="toast"></div>

<script src="/admin/admin-client.js"></script>
</body>
</html>
